<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <style>
    /* ─── جميع الأنماط الأصلية محولة من JSX inline ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06080a; color: #dde8e4; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; min-height: 100vh; display: flex; flex-direction: column; }

    #app { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }
    .root { background: #06080a; color: #dde8e4; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; }

    /* Header */
    .hdr { background: #0c1014; border-bottom: 1px solid #1c2830; padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logoText { font-family: Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 700; color: #00e5b0; line-height: 1; }
    .logoSub { font-size: 10px; color: #7a9e96; margin-top: 2px; letter-spacing: 0.3px; }
    .pill { background: #1a0808; border: 1px solid #f44336; color: #f44336; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; }
    .nav { display: flex; gap: 5px; margin-right: auto; flex-wrap: wrap; }
    .nb { background: transparent; color: #7a9e96; border: 1px solid #1c2830; border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
    .nb.active { background: #00bfa5; color: #06080a; border-color: #00bfa5; }
    .nb:hover { opacity: 0.8; }

    /* Stats */
    .stats { background: #101518; border-bottom: 1px solid #1c2830; padding: 7px 20px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .stat-item { display: flex; flex-direction: column; align-items: flex-start; }
    .stat-num { font-family: Georgia, serif; font-size: 22px; font-weight: 700; color: #00bfa5; line-height: 1; }
    .stat-num.red { color: #f44336; }
    .stat-num.orange { color: #ff6d00; }
    .stat-num.amber { color: #ffab00; }
    .stat-num.sub { color: #7a9e96; }
    .stat-label { font-size: 9px; color: #7a9e96; margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }
    .stat-live { margin-right: auto; font-size: 10px; color: #7a9e96; line-height: 1.6; }
    .stat-live span { color: #00bfa5; }

    /* Filter */
    .fRow { display: flex; gap: 6px; padding: 8px 20px; background: #101518; border-bottom: 1px solid #1c2830; flex-wrap: wrap; align-items: center; }
    .fRow-label { font-size: 11px; color: #7a9e96; margin-left: 4px; }
    .chip { background: transparent; color: #7a9e96; border: 1px solid #1c2830; border-radius: 20px; padding: 4px 13px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .chip.active { background: #00bfa5; color: #06080a; border-color: #00bfa5; }

    /* Map + Sidebar */
    .mapRow { flex: 1; display: flex; min-height: 0; height: 100%; }
    .sb { width: 280px; background: #101518; border-right: 1px solid #1c2830; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    .sbH { padding: 10px 14px; border-bottom: 1px solid #1c2830; font-size: 11px; font-weight: 700; color: #7a9e96; display: flex; justify-content: space-between; align-items: center; }
    .sbH span:last-child { color: #00bfa5; font-size: 10px; }
    .feed { flex: 1; overflow-y: auto; }
    .fi { padding: 10px 14px; border-bottom: 1px solid #1c2830; cursor: pointer; background: transparent; border-right: 3px solid transparent; transition: background .12s; }
    .fi.active { background: #0d1e1a; border-right-color: #00bfa5; }
    .fi-top { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .fi-sev { font-size: 11px; font-weight: 700; }
    .fi-time { font-size: 10px; color: #7a9e96; }
    .fi-city { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .fi-desc { font-size: 11px; color: #7a9e96; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .sb-btn-wrap { padding: 12px; border-top: 1px solid #1c2830; }
    .sb-btn { background: #00bfa5; color: #06080a; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; font-family: Georgia, serif; letter-spacing: 0.3px; }
    .sb-btn:hover { opacity: 0.85; }

    .mapArea { flex: 1; position: relative; overflow: hidden; background: #06080a; min-height: 400px; }
    .mapArea svg { width: 100% !important; height: 100% !important; display: block; }

    /* Legend */
    .legend { position: absolute; bottom: 14px; right: 14px; background: rgba(6, 8, 10, 0.9); border: 1px solid #1c2830; border-radius: 8px; padding: 9px 13px; font-size: 11px; direction: rtl; z-index: 5; }
    .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-text { color: #7a9e96; }
    .legend-founder { border-top: 1px solid #1c2830; margin-top: 6px; padding-top: 6px; font-size: 10px; color: #7a9e96; }

    /* Map labels */
    .map-label-44 { position: absolute; top: 6px; left: 8px; font-size: 9px; color: #2a3d38; }
    .map-label-10 { position: absolute; bottom: 6px; left: 8px; font-size: 9px; color: #2a3d38; }
    .map-label-55 { position: absolute; bottom: 6px; left: 50%; font-size: 9px; color: #2a3d38; transform: translateX(-50%); }

    .pop-city { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .pop-tag { font-size: 10px; border-radius: 4px; padding: 2px 7px; display: inline-block; margin-left: 6px; }
    .pop-tag-animal { background: #004d40; color: #00bfa5; }
    .pop-tag-water { background: #1a1a0a; color: #ffab00; }
    .pop-note { font-size: 11px; color: #c8b99a; font-style: italic; border-top: 1px solid #1c2830; padding-top: 8px; line-height: 1.6; margin-top: 4px; }
    .pop-meta { font-size: 10px; color: #7a9e96; margin-top: 8px; display: flex; justify-content: space-between; }

    /* Form */
    .pg { max-width: 520px; margin: 0 auto; padding: 32px 18px; width: 100%; }
    .lab { display: block; font-size: 11px; font-weight: 700; color: #7a9e96; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .sel, .inp, .ta { width: 100%; background: #0c1014; color: #dde8e4; border-radius: 8px; padding: 10px 13px; font-size: 14px; outline: none; direction: rtl; box-sizing: border-box; font-family: inherit; }
    .sel { border: 1px solid #1c2830; appearance: auto; margin-bottom: 4px; }
    .sel.err, .inp.err { border-color: #f44336; }
    .inp { border: 1px solid #1c2830; }
    .ta { border: 1px solid #1c2830; resize: vertical; min-height: 80px; }
    .err-msg { color: #f44336; font-size: 12px; margin-bottom: 10px; }
    .hint { font-size: 11px; color: #7a9e96; margin-top: 4px; line-height: 1.5; }
    .sec { margin-bottom: 20px; }
    .btn { background: #00bfa5; color: #06080a; border: none; border-radius: 8px; padding: 13px 28px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 6px; font-family: Georgia, serif; letter-spacing: 0.3px; }
    .btn:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border: 1px solid #00bfa5; color: #00bfa5; }

    /* About */
    .about { max-width: 620px; margin: 0 auto; padding: 36px 18px; }
    .about-title { font-family: Georgia, serif; font-size: 27px; font-weight: 700; line-height: 1.35; margin-bottom: 14px; color: #c8b99a; }
    .about-desc { color: #7a9e96; line-height: 1.95; font-size: 14px; margin-bottom: 34px; }
    .about-block { margin-bottom: 26px; padding-right: 16px; border-right: 2px solid #00bfa5; }
    .about-block-title { font-family: Georgia, serif; font-weight: 700; font-size: 15px; margin-bottom: 8px; color: #00bfa5; }
    .about-block-text { color: #7a9e96; line-height: 1.85; font-size: 13px; }
    .about-partners { margin-top: 10px; margin-bottom: 28px; padding: 14px 18px; background: #101518; border-radius: 10px; border: 1px solid #1c2830; }
    .about-partners-label { font-size: 10px; color: #7a9e96; margin-bottom: 10px; text-align: center; letter-spacing: 0.5px; }
    .about-partners-list { display: flex; justify-content: center; gap: 28px; flex-wrap: wrap; }
    .about-partners-list span { font-size: 12px; font-weight: 700; color: #2a3d38; letter-spacing: 0.3px; }

    /* Seismo */
    .seismo-wrap { display: inline-block; }

    /* Responsive */
    @media (max-width: 700px) {
      .sb { width: 100%; max-height: 280px; border-right: none; border-bottom: 1px solid #1c2830; }
      .mapRow { flex-direction: column-reverse; }
      .hdr { flex-direction: column; align-items: stretch; }
      .nav { margin-right: 0; justify-content: center; }
      .stats { gap: 12px; justify-content: center; }
      .pop { left: 8px; right: 8px; bottom: 8px; max-width: none; }
      .legend { bottom: 8px; right: 8px; }
      .about-title { font-size: 22px; }
      .logoText { font-size: 17px; }
    }
    @media (max-width: 450px) {
      .hdr { padding: 8px 12px; gap: 8px; }
      .nb { padding: 4px 10px; font-size: 11px; }
      .stats { padding: 5px 12px; gap: 8px; }
      .stat-num { font-size: 17px; }
      .fRow { padding: 6px 12px; gap: 4px; }
      .chip { padding: 3px 8px; font-size: 10px; }
      .sb { max-height: 200px; }
      .fi { padding: 6px 10px; }
      .pop { padding: 12px; }
    }
  </style>
</head>
<body>

  <script>
    // ══════════════════════════════════════════════════════════════════
    // كل الكود الأصلي محول إلى JavaScript نقي (بدون React)
    // ══════════════════════════════════════════════════════════════════

    // ── الألوان ──────────────────────────────────────────────────────
    const C = {
      bg:       "#06080a",
      surface:  "#0c1014",
      panel:    "#101518",
      border:   "#1c2830",
      teal:     "#00bfa5",
      tealLow:  "#004d40",
      amber:    "#ffab00",
      orange:   "#ff6d00",
      red:      "#f44336",
      text:     "#dde8e4",
      sub:      "#7a9e96",
      faint:    "#2a3d38",
      sand:     "#c8b99a",
      oman:     "#00e5b0",
      grid:     "#111a1f",
    };

    // ── Severity ──────────────────────────────────────────────────────
    const SEV_COLOR = [C.sub, C.amber, C.orange, C.red];
    const SEV_AR    = ["عادي", "ملاحظة", "تنبيه", "تحذير عالٍ"];
    const SEV_EN    = ["Normal", "Notable", "Alert", "High Alert"];

    function calcSev(animal, water) {
      const a = animal === "لا شيء غير عادي" ? 0 : animal.includes("أكثر") ? 3 : 2;
      const w = water  === "لا شيء غير عادي" ? 0 : 1;
      return Math.min(3, a + w);
    }

    function ago(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60)   return `منذ ${s}ث`;
      if (s < 3600) return `منذ ${Math.floor(s/60)}د`;
      if (s < 86400)return `منذ ${Math.floor(s/3600)}س`;
      return `منذ ${Math.floor(s/86400)} يوم`;
    }

    // ── Regions ──────────────────────────────────────────────────────
    const REGIONS = [

      { ar:"اليمن",        cities:["صنعاء","عدن","حضرموت","المكلا","تعز","الحديدة"] },
      { ar:"إيران",        cities:["طهران","بندر عباس","شيراز","أصفهان","مشهد","أهواز"] },
      { ar:"باكستان",      cities:["كراتشي","مكران","كويتا","لاهور","إسلام آباد"] },
      { ar:"تركيا",        cities:["إسطنبول","أنقرة","إزمير","هاتاي","غازي عنتاب"] },
      { ar:"العراق",       cities:["بغداد","البصرة","الموصل","أربيل","كركوك"] },
      { ar:"الأردن",       cities:["عمّان","العقبة","الزرقاء","إربد"] },
      { ar:"منطقة أخرى",  cities:[] },
    ];

    const ANIMAL_OPTS = [
      "لا شيء غير عادي",
      "الطيور طارت بعيداً فجأة نحو الداخل",
      "الكلاب / القطط قلقة وتعوي بلا توقف",
      "النمل والديدان خرجت بكميات كبيرة",
      "الإبل / الأبقار / الماعز رفضت الأكل أو كسرت السياج",
      "الأسماك قفزت خارج الماء",
      "الحيوانات اختفت فجأة من المنطقة",
      "أكثر من ظاهرة في نفس الوقت",
    ];

    const WATER_OPTS = [
      "لا شيء غير عادي",
      "ماء البئر / الفلج أصبح دافئاً بشكل غير عادي",
      "الماء أصبح غائماً أو طينياً",
      "البئر أو الفلج جف فجأة",
      "رائحة كبريت أو غاز في الماء",
      "الماء أصبح مالحاً أو معدنياً",
      "السماء لونها غريب أو محمر",
      "الأرض دافئة أو تهتز خفيفاً تحت القدمين",
      "صوت طنين أو دوي منخفض من الأرض",
    ];

    // ── Seed Data ──────────────────────────────────────────────────
    const SEED = [
      { id:1,  region:"عُمان",    city:"صحار",       animal:"الإبل / الأبقار / الماعز رفضت الأكل أو كسرت السياج", water:"ماء البئر / الفلج أصبح دافئاً بشكل غير عادي", note:"الإبل لم تجلس طوال الليل وكانت تتجه نحو الشمال باستمرار", lat:24.08, lng:56.50, ts:Date.now()-1000*60*22,  sev:3 },
      { id:2,  region:"عُمان",    city:"مسقط",       animal:"الكلاب / القطط قلقة وتعوي بلا توقف",               water:"لا شيء غير عادي",                              note:"كلاب الحي كلها اختفت صباحاً",                              lat:23.58, lng:58.40, ts:Date.now()-1000*60*55,  sev:2 },
      { id:3,  region:"عُمان",    city:"صلالة",      animal:"الطيور طارت بعيداً فجأة نحو الداخل",               water:"لا شيء غير عادي",                              note:"أسراب ضخمة باتجاه الشمال عند الفجر",                      lat:17.02, lng:54.09, ts:Date.now()-1000*60*98,  sev:2 },
      { id:4,  region:"عُمان",    city:"نزوى",       animal:"لا شيء غير عادي",                                  water:"رائحة كبريت أو غاز في الماء",                   note:"الفلج فيه رائحة غريبة منذ يومين",                         lat:22.93, lng:57.53, ts:Date.now()-1000*60*180, sev:2 },
      { id:5,  region:"إيران",    city:"بندر عباس",  animal:"الأسماك قفزت خارج الماء",                           water:"الماء أصبح غائماً أو طينياً",                   note:"الصيادون لاحظوا ذلك قبل الفجر مباشرة",                   lat:27.18, lng:56.27, ts:Date.now()-1000*60*240, sev:3 },
      { id:6,  region:"الإمارات", city:"العين",      animal:"الإبل / الأبقار / الماعز رفضت الأكل أو كسرت السياج", water:"لا شيء غير عادي",                            note:"الجمال قلقة جداً من أمس",                                  lat:24.22, lng:55.76, ts:Date.now()-1000*60*320, sev:2 },
      { id:7,  region:"اليمن",    city:"حضرموت",     animal:"النمل والديدان خرجت بكميات كبيرة",                  water:"البئر أو الفلج جف فجأة",                        note:"",                                                         lat:15.93, lng:48.82, ts:Date.now()-1000*60*410, sev:3 },
      { id:8,  region:"تركيا",    city:"هاتاي",      animal:"أكثر من ظاهرة في نفس الوقت",                        water:"الماء أصبح غائماً أو طينياً",                   note:"طيور، كلاب، وماء نهر متغير كلها في نفس الوقت",            lat:36.20, lng:36.16, ts:Date.now()-1000*60*500, sev:3 },
      { id:9,  region:"باكستان",  city:"مكران",      animal:"الكلاب / القطط قلقة وتعوي بلا توقف",               water:"ماء البئر / الفلج أصبح دافئاً بشكل غير عادي",   note:"",                                                         lat:25.29, lng:62.04, ts:Date.now()-1000*60*610, sev:2 },
      { id:10, region:"السعودية", city:"نجران",      animal:"لا شيء غير عادي",                                  water:"البئر أو الفلج جف فجأة",                        note:"بئرنا منذ ٣٠ سنة لم ينضب",                                lat:17.49, lng:44.13, ts:Date.now()-1000*60*720, sev:1 },
      { id:11, region:"عُمان",    city:"صور",        animal:"الحيوانات اختفت فجأة من المنطقة",                   water:"صوت طنين أو دوي منخفض من الأرض",                note:"هدوء غريب جداً — لا طيور، لا حشرات منذ الفجر",            lat:22.57, lng:59.53, ts:Date.now()-1000*60*800, sev:3 },
      { id:12, region:"العراق",   city:"البصرة",     animal:"الأسماك قفزت خارج الماء",                           water:"الماء أصبح مالحاً أو معدنياً",                  note:"",                                                         lat:30.50, lng:47.83, ts:Date.now()-1000*60*900, sev:2 },
    ];

    // ── Map Projection ──────────────────────────────────────────────
    const VW = 900, VH = 480;
    const LN0 = 32, LN1 = 78, LT0 = 44, LT1 = 10;

    function proj(lat, lng) {
      const x = ((lng - LN0) / (LN1 - LN0)) * VW;
      const y = ((LT0 - lat) / (LT0 - LT1)) * VH;
      return [x, y];
    }

    function pt(lat, lng) { const [x,y] = proj(lat,lng); return `${x.toFixed(1)},${y.toFixed(1)}`; }

    // ── دالة إنشاء SVG الخريطة (ترجع string) ──────────────────────
    function buildWorldMapSVG(reports, sel, sevFilter) {
      const vis = sevFilter > 0 ? reports.filter(r => r.sev >= sevFilter) : reports;
      const gridLats = [15,20,25,30,35,40];
      const gridLngs = [35,40,45,50,55,60,65,70,75];
      const labels = [
        { n:"عُمان",      lat:22.0, lng:57.8, oman:true  },
        { n:"صحار",       lat:24.4, lng:56.7, city:true  },
        { n:"الإمارات",   lat:24.2, lng:53.5              },
        { n:"السعودية",   lat:23.5, lng:43.5              },
        { n:"اليمن",      lat:15.0, lng:47.5              },
        { n:"إيران",      lat:31.5, lng:52.5              },
        { n:"باكستان",    lat:27.5, lng:67.0              },
        { n:"تركيا",      lat:39.0, lng:36.5              },
        { n:"العراق",     lat:33.0, lng:43.5              },
        { n:"الأردن",     lat:31.5, lng:36.5              },
      ];

      // توليد علامات (markers) كـ SVG
      let markersHTML = '';
      vis.forEach(r => {
        const [x, y] = proj(r.lat, r.lng);
        const col = SEV_COLOR[r.sev];
        const isS = sel && sel.id === r.id;
        const rad = isS ? 8 : 5;
        let anim = '';
        if (r.sev >= 2) {
          anim = `<circle cx="${x}" cy="${y}" r="${rad * 3}" fill="${col}" opacity="0">
            <animate attributeName="r" values="${rad};${rad*4};${rad}" dur="2.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.18;0;0.18" dur="2.5s" repeatCount="indefinite"/>
          </circle>`;
        }
        let extra = '';
        if (isS) {
          extra = `<circle cx="${x}" cy="${y}" r="${rad+5}" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.6"/>`;
        }
        markersHTML += `
          <g onclick="window.handleMarkerClick(${r.id})" style="cursor:pointer;">

    // ── Seismograph (مكون SVG حي) ──────────────────────────────────
    function createSeismo(containerId, active) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const W = 200, H = 32, mid = H / 2;
      let wave = Array(60).fill(0);
      let intervalId;

      function renderWave() {
        const pts = wave.map((v, i) => `${(i / (wave.length-1)) * W},${mid - v}`).join(' ');
        container.innerHTML = `
          <svg width="${W}" height="${H}" style="display:block;">
            <polyline points="${pts}" fill="none" stroke="${active ? C.red : C.teal}" stroke-width="1.2" opacity="0.85" />
            <line x1="${W-1}" y1="0" x2="${W-1}" y2="${H}" stroke="${active ? C.red : C.teal}" stroke-width="1" opacity="0.4" />
          </svg>
        `;
      }

      function updateWave() {
        const spike = active ? (Math.random() > 0.7 ? (Math.random() * 18 + 4) * (Math.random()>0.5?1:-1) : Math.random()*3-1.5) : Math.random()*2-1;
        wave = [...wave.slice(1), spike];
        renderWave();
      }

      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(updateWave, 80);
      renderWave();
      return () => clearInterval(intervalId);
    }

                <option value="">اختر ما لاحظته…</option>

              </select>
              ${errs.animal ? `<div class="err-msg">${errs.animal}</div>` : ''}
            </div>

            <div class="sec">
              <label class="lab">تغيرات في الماء أو السماء أو الأرض؟ *</label>
              <select class="sel ${errs.water ? 'err' : ''}" id="form-water" onchange="window.updateForm('water', this.value)">
                <option value="">اختر ما لاحظته…</option>
                ${WATER_OPTS.map(o => `<option value="${o}" ${f.water === o ? 'selected' : ''}>${o}</option>`).join('')}
              </select>
              ${errs.water ? `<div class="err-msg">${errs.water}</div>` : ''}
            </div>

            <div class="sec">
              <label class="lab">موقعك الدقيق *</label>
              <input class="inp ${errs.location ? 'err' : ''}" id="form-location" placeholder='مثال: "صحار، بجانب الميناء" أو رابط خرائط جوجل' value="${f.location}" oninput="window.updateForm('location', this.value)"/>
              <div class="hint">كلما كان الموقع أدق، كلما كانت البيانات أكثر فائدة للعلماء</div>
              ${errs.location ? `<div class="err-msg">${errs.location}</div>` : ''}
            </div>

            <div class="sec">
              <label class="lab">صِف بكلماتك الخاصة <span style="color:${C.faint};font-weight:400;">(اختياري)</span></label>
              <textarea class="ta" id="form-note" placeholder="متى لاحظت بالضبط؟ كم عدد الحيوانات؟ هل حدث هذا من قبل؟ أي تفصيل مفيد…" oninput="window.updateForm('note', this.value)">${f.note}</textarea>
            </div>

            <button class="btn" onclick="window.submitReport()">أرسل التبليغ ←</button>
            <div style="font-size:11px;color:${C.sub};text-align:center;margin-top:10px;line-height:1.7;">
              لا بريد إلكتروني · لا حساب مطلوب<br/>
              بياناتك مجهولة ومشتركة مع العلماء حول العالم
            </div>
          </div>
        </div>
      `;
    }

    // ── بناء صفحة "عن المشروع" ──────────────────────────────────────
    function buildAboutView() {
      return `
        <div class="root">
          <div class="hdr">
            <div class="logo">
              <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="${C.oman}" stroke-width="1.5"/><circle cx="14" cy="14" r="3" fill="${C.oman}"/></svg>
              <div><div class="logoText">نبضة الأرض</div><div class="logoSub">PulseMap</div></div>
            </div>
            <div class="nav">
              <button class="nb" onclick="window.switchView('map')">الخريطة</button>
              <button class="nb" onclick="window.switchView('report')">+ أبلّغ</button>
              <button class="nb active" onclick="window.switchView('about')">عن المشروع</button>
            </div>
          </div>
          <div class="about">
            <div class="about-title">الحشود التي تنبأت بالزلزال.</div>
            <div class="about-desc">الأقمار الصناعية تكلّف المليارات — وتصل متأخرة. لكن إبل الجار كسرت السياج الساعة ٣ فجراً قبل ٣٦ ساعة من الزلزال. الفلج رائحته تغيّرت قبل يومين من الفيضان. العلماء يعرفون هذا منذ عقود، لكن لم يجمع أحد هذه البيانات بشكل عالمي ومباشر — حتى الآن.</div>

            ${[
              ["الفكرة", "نبضة الأرض هي أول شبكة عالمية من المراقبين البشريين الذين يرصدون الإشارات الحيوية السابقة للكوارث. نجمع ما لا تستطيع الأقمار الصناعية رصده: رائحة الفلج، صمت الطيور، قلق الإبل، دفء الأرض. المشروع أسسه شاب عُماني انطلاقاً من الخليج."],
              ["العلم", "الإشارات الكهربائية الضغطية، غاز الرادون، التغيرات الكهرومغناطيسية — كلها تصل إلى السطح قبل موجات الزلازل. دراسات من الصين واليابان وإيطاليا أكدت سلوكاً غير عادي للحيوانات بـ١٢ إلى ٧٢ ساعة قبل الزلازل الكبرى. المشكلة الوحيدة: لا أحد جمّع هذه البيانات بالحجم الكافي."],
              ["المنطقة المستهدفة", "عُمان والخليج والشرق الأوسط — منطقة نشطة زلزالياً تحت بحر العرب وخليج عُمان. صحار وصور ومسقط وصلالة كلها مدن ساحلية في نطاق خطر الأمواج والزلازل. أهلها يملكون خبرة أجيال في قراءة الطبيعة."],
              ["ماذا يحدث ببياناتك؟", "كل التبليغات مفتوحة. بعد ٣٠ يوماً تُشارك مع جامعة طوكيو، وETH Zurich، وهيئة المسح الجيولوجي الأمريكي USGS، وأي باحث يطلبها. تبليغك يصبح جزءاً من أكبر قاعدة بيانات مشاهدات شعبية زلزالية في التاريخ — باسمك كمؤسس."],
            ].map(([t,b]) => `
              <div class="about-block">
                <div class="about-block-title">${t}</div>
                <div class="about-block-text">${b}</div>
              </div>
            `).join('')}

            <div class="about-partners">
              <div class="about-partners-label">سيُشارك البحث مع</div>
              <div class="about-partners-list">
                ${["USGS","ETH Zurich","Univ. Tokyo","KACST"].map(n => `<span>${n}</span>`).join('')}
              </div>
            </div>

            <button class="btn" onclick="window.switchView('report')">سجّل أول تبليغ ←</button>
          </div>
        </div>
      `;
    }

    // ── تحديث إحصائيات الـ Header ──────────────────────────────────
    function updateHeaderStats() {
      // يتم تحديثها أثناء إعادة الرسم الكامل
    }

    // ── ربط الأحداث (Map) ──────────────────────────────────────────
    function attachMapEvents() {
      // الأحداث مضافة عبر onclick في الـ HTML نفسه
    }

    // ── ربط الأحداث (Report) ──────────────────────────────────────
    function attachReportEvents() {
      // الأحداث مضافة عبر onchange/oninput في الـ HTML
    }

    function attachAboutEvents() {}

    // ── دوال العمليات (متاحة عالمياً) ──────────────────────────────
    window.switchView = function(view) {
      state.view = view;
      if (view === 'map') {
        state.submitted = false;
      }
      render();
    };

    window.setFilter = function(level) {
      state.sevF = level;
      render();
    };

    window.handleFeedClick = function(id) {
      const report = state.reports.find(r => r.id === id);
      if (report) {
        state.sel = report;
        render();
      }
    };

    window.handleMarkerClick = function(id) {
      const report = state.reports.find(r => r.id === id);
      if (report) {
        state.sel = report;
        render();
      }
    };

    window.closePopover = function() {
      state.sel = null;
      render();
    };

    window.updateForm = function(field, value) {
      state.form[field] = value;
      // إذا تغيرت المنطقة، أعد تعيين المدينة
      if (field === 'region') {
        state.form.city = '';
        state.errs.region = '';
      }
      // مسح الأخطاء عند التغيير
      if (state.errs[field]) {
        state.errs[field] = '';
      }
      render();
    };

    window.submitReport = function() {
      const f = state.form;
      const e = {};
      if (!f.region) e.region = "اختر المنطقة";
      if (!f.animal) e.animal = "اختر ما لاحظته بخصوص الحيوانات";
      if (!f.water) e.water = "اختر ما لاحظته بخصوص الماء أو السماء";
      if (!f.location.trim()) e.location = "أدخل اسم موقعك";

      if (Object.keys(e).length) {
        state.errs = e;
        render();
        return;
      }

      const { lat, lng } = getRegionLL(f.region, f.city);
      const sev = calcSev(f.animal, f.water);
      const newReport = {
        id: state.nextId++,
        region: f.region,
        city: f.city || f.location,
        animal: f.animal,
        water: f.water,
        note: f.note,
        lat, lng,
        ts: Date.now(),
        sev
      };

      state.reports = [newReport, ...state.reports];
      localStorage.setItem('pulsemap_reports', JSON.stringify(state.reports));
      state.submitted = true;
      state.errs = {};
      render();
    };

    window.resetForm = function() {
      state.form = { region: '', city: '', animal: '', water: '', note: '', location: '' };
      state.errs = {};
      state.submitted = false;
      render();
    };

    window.resetFormAndGoMap = function() {
      state.form = { region: '', city: '', animal: '', water: '', note: '', location: '' };
      state.errs = {};
      state.submitted = false;
      state.view = 'map';
      render();
    };

    // ── بدء التطبيق ──────────────────────────────────────────────────
    render();
  </script>
</body>
